<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />

    <!-- Main Game CSS -->
    <link rel="stylesheet" href="assets/css/app.css" type="text/css" />

    <!-- Rank System CSS -->
    <link rel="stylesheet" href="css/rank.css" type="text/css" />

    <title>Basketball Stars Unblocked</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!-- Fullscreen Script -->
    <script src="js/fullscreen.js"></script>
</head>

<body>
    <div id="content"></div>
    <div id="orientation"></div>
    <div id="loader">Loading ...</div>

    <!-- Game Scripts -->
    <script type="text/javascript" src="assets/box2dweb/nape.min.js"></script>
    <script type="text/javascript" src="assets/box2dweb/nape-debug-draw.min.js"></script>
    <script type="text/javascript" src="assets/box2dweb/jquery-3.1.1.min.js"></script>
    <script type="text/javascript" src="assets/box2dweb/easeljs-0.8.2.combined.js"></script>
    <script type="text/javascript" src="assets/box2dweb/bluebird.min.js"></script>

    <!-- Game Dispatch/Event Handling -->
    <script type="text/javascript">
        var useEvents = (typeof(Event) === 'function');

        var myDispatchEvent = function (name){
            var event;
            if (useEvents){
                event =  new Event(name);
            } else {
                event = document.createEvent('Event');
                event.initEvent(name, true, true);
            }
            document.getElementById("content").dispatchEvent(event);
        }

        window["GD_OPTIONS"] = {
            "gameId": "69d78d071f704fa183d75b4114ae40ec",
            "onEvent": function(event) {
                switch (event.name) {
                    case "SDK_GAME_START":
                        myDispatchEvent('SDK_GAME_START');
                        break;
                    case "SDK_GAME_PAUSE":
                        myDispatchEvent('SDK_GAME_PAUSE');
                        break;
                    case "SDK_GDPR_TRACKING":
                        console.log("SDK_GDPR_TRACKING");
                        break;
                    case "SDK_GDPR_TARGETING":
                        console.log("SDK_GDPR_TARGETING");
                        break;
                    case "SDK_READY":
                        console.log("SDK_READY");
                        break;
                }
            },
        };

        (function(d, s, id) {
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) return;
            js = d.createElement(s);
            js.id = id;
            js.src = 'js/main.min.js';
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'gamedistribution-jssdk'));
    </script>

    <!-- Game core -->
    <script type="text/javascript" src="basketball_legends_2019.min.js"></script>
    <script src="js/analytics_ubg_v1_4.js"></script>

    <!-- Automatic SDK_GAME_OVER Hook -->
    <script>
        // Example hook for game-over
        if(window.gameOver){
            const originalGameOver = window.gameOver;
            window.gameOver = function(result){
                originalGameOver(result);

                // Dispatch SDK_GAME_OVER for rank system
                document.getElementById("content").dispatchEvent(
                    new CustomEvent("SDK_GAME_OVER", { detail: { result: result } })
                );
            };
        }
    </script>

    <!-- Rank System Script -->
    <script src="js/rank.js"></script>

</body>
</html>
